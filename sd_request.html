<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма заявки в техническую поддержку</title>
    <link rel="stylesheet" href="css/custom.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #5050eb;">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">📋 ЗАЯВКА В ТЕХПОДДЕРЖКУ</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house"></i> Главная</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="request-container">
        <div class="request-card">
            <div class="request-header">
                <h2><i class="bi bi-person-plus-fill me-2"></i>Заявка на учетную запись</h2>
                <p>Заполните форму для создания новой учетной записи</p>
            </div>
            
            <form id="requestForm" class="request-form">
                <div class="form-section">
                    <h4 class="section-title"><i class="bi bi-person-lines-fill me-2"></i>Личные данные</h4>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label"><i class="bi bi-person-vcard"></i> Фамилия *</label>
                                <input type="text" class="form-control" id="id_fam" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label"><i class="bi bi-person"></i> Имя *</label>
                                <input type="text" class="form-control" id="id_im" required>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label"><i class="bi bi-person-badge"></i> Отчество</label>
                                <input type="text" class="form-control" id="id_otch">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label"><i class="bi bi-calendar-date"></i> Дата рождения</label>
                                <input type="date" class="form-control" id="id_byrthdate">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h4 class="section-title"><i class="bi bi-briefcase me-2"></i>Рабочие данные</h4>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label"><i class="bi bi-person-workspace"></i> Должность *</label>
                                <input type="text" class="form-control" id="id_dolgn" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label class="form-label"><i class="bi bi-telephone"></i> Рабочий телефон</label>
                                <input type="tel" class="form-control" id="id_tel">
                                <small class="form-text text-muted">Необязательно</small>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="form-section">
                    <h4 class="section-title"><i class="bi bi-shield-lock me-2"></i>Данные для учетной записи</h4>
                    <div class="form-group">
                        <label class="form-label"><i class="bi bi-list-check"></i> Тип учетной записи *</label>
                        <select class="form-select" id="id_req_type" required>
                            <option value="">Выберите тип...</option>
                            <option value="email">Электронная почта MED-TO</option>
                            <option value="inf">ИС «Инфекций.Нет»</option>
                            <option value="both">Обе системы</option>
                        </select>
                        <small class="form-text text-warning"><i class="bi bi-exclamation-triangle-fill"></i> Внимательно выберите тип учетной записи</small>
                    </div>
                    <div class="form-group">
                        <label class="form-label"><i class="bi bi-credit-card"></i> СНИЛС</label>
                        <input type="text" class="form-control" id="id_snils" placeholder="000-000-000 00">
                        <small class="form-text text-muted">Необязательно, но желательно</small>
                    </div>
                </div>
                
                <div class="form-footer">
                    <button type="submit" class="btn btn-primary btn-submit">
                        <i class="bi bi-send-fill me-2"></i>Отправить заявку
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/sd_request.js"></script>
</body>
</html>
