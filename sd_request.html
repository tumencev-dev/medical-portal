<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма заявки в техническую поддержку</title>
    <link rel="stylesheet" href="css/custom.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📋%3C/text%3E%3C/svg%3E">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #5050eb;">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-tools me-2"></i>ЗАЯВКА В ТЕХПОДДЕРЖКУ
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home"></i> Главная</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="request-container">
        <div class="request-card">
            <div class="request-header" style="background: linear-gradient(135deg, #ff9800 0%, #f44336 100%);">
                <h2><i class="fas fa-hard-hat me-2"></i>Страница в разработке</h2>
                <p>Функционал подачи заявок временно недоступен</p>
            </div>
            
            <div class="request-form" style="padding: 40px; text-align: center;">
                <i class="fas fa-hammer" style="font-size: 4rem; color: #ffc107;"></i>
                <h3 class="mt-3">Технические работы</h3>
                <p class="text-muted mt-3">
                    В настоящее время ведутся технические работы по улучшению сервиса.<br>
                    Приносим извинения за временные неудобства.
                </p>
                <div class="mt-4">
                    <a href="index.html" class="btn btn-primary">
                        <i class="fas fa-arrow-left me-2"></i>Вернуться на главную
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
