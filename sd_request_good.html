<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявка отправлена</title>
    <link rel="stylesheet" href="css/custom.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #5050eb;">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">📋 ЗАЯВКА В ТЕХПОДДЕРЖКУ</a>
        </div>
    </nav>

    <div class="success-container">
        <div class="success-card">
            <div class="success-icon">
                <i class="bi bi-check-circle-fill"></i>
            </div>
            <h3>Заявка успешно отправлена!</h3>
            <p class="success-message">
                Ваша заявка на создание учетной записи принята в обработку.<br>
                Файл с заявкой был сохранен на вашем компьютере.<br>
                По готовности с вами свяжется техник-программист.
            </p>
            <div class="success-actions">
                <a href="sd_request.html" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-2"></i>Новая заявка
                </a>
                <a href="index.html" class="btn btn-outline-primary">
                    <i class="bi bi-house me-2"></i>На главную
                </a>
            </div>
        </div>
    </div>

    <script>
        // Показываем количество сохраненных заявок (опционально)
        const requests = JSON.parse(localStorage.getItem('tech_requests') || '[]');
        console.log(`Всего отправлено заявок: ${requests.length}`);
    </script>
</body>
</html>
